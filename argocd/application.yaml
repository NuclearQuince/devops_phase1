apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-phase1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/NuclearQuince/devops_phase1
    targetRevision: HEAD
    path: helm/devops-phase1
    helm:
      values: |
        image:
          repository: nuclearquince/devops-phase1
          tag: latest
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true