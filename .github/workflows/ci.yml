name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (flake8)
        run: |
          pip install flake8
          flake8 app/ tests/ --max-line-length=100

      - name: Run tests
        run: pytest tests/ -v --tb=short

  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            nuclearquince/devops-phase1:latest
            nuclearquince/devops-phase1:${{ github.sha }}
  
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Simulate deployment (dry-run)
        run: |
          # Install PyYAML to validate manifests
          pip install pyyaml --quiet

          # Validate YAML structure of manifests
          python3 -c "
          import yaml, sys

          files = ['k8s/deployment.yaml', 'k8s/service.yaml']
          for f in files:
              with open(f) as fp:
                  yaml.safe_load(fp)
              print(f'✅ {f} is valid YAML')

          print('')
          print('🚀 Would deploy image: nuclearquince/devops-phase1:${{ github.sha }}')
          print('📦 Replicas: 2')
          print('🌐 Service: devops-phase1-service on port 80')
          print('✅ Deployment simulation complete!')