apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-phase1-app
  labels:
    app: devops-phase1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: devops-phase1
  template:
    metadata:
      labels:
        app: devops-phase1
    spec:
      containers:
        - name: app
          image: nuclearquince/devops-phase1:latest
          imagePullPolicy: Always
          ports:  
            - containerPort: 8000